<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');
  :root{
    --ink:#14110f;        /* warm near-black, cast iron */
    --surface:#1f1b18;    /* raised panel */
    --surface-2:#2a2420;  /* deeper inset */
    --line:#3a322c;       /* hairline */
    --chalk:#f0ebe3;      /* warm white */
    --muted:#8a807a;      /* secondary text */
    --faint:#5c544e;      /* placeholders / ghosts */
    --forge:#e8541e;      /* molten iron — the one accent */
    --forge-dim:#a23a14;
    --steel:#6c8aa0;      /* cool reference accent */
    --ok:#7fae5a;
    --nav-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--chalk);
    font-family:'Inter',system-ui,sans-serif;
    font-size:16px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
  .disp{font-family:'Oswald',sans-serif;letter-spacing:.01em;}

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--ink),var(--ink) 70%, rgba(20,17,15,.0));
    padding:18px 18px 10px;
    display:flex;align-items:baseline;justify-content:space-between;
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .logo{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:26px;letter-spacing:.06em;
    text-transform:uppercase;
  }
  .brand .logo b{color:var(--forge);}
  .brand .tag{font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;}
  .today-date{font-size:12px;color:var(--muted);text-align:right;line-height:1.2;}
  .today-date b{display:block;color:var(--chalk);font-weight:600;font-size:13px;}

  main{padding:6px 16px 24px;max-width:560px;margin:0 auto;}

  /* ---------- day pills ---------- */
  .pills{display:flex;gap:8px;overflow-x:auto;padding:6px 2px 14px;scrollbar-width:none;}
  .pills::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto;border:1px solid var(--line);background:var(--surface);
    color:var(--muted);padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;
    white-space:nowrap;cursor:pointer;transition:.15s;text-transform:uppercase;letter-spacing:.04em;
  }
  .pill:active{transform:scale(.96);}
  .pill.on{background:var(--forge);border-color:var(--forge);color:#fff;}

  /* ---------- section head ---------- */
  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin:4px 0 14px;}
  .sec-head h2{
    font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;
    font-size:24px;margin:0;letter-spacing:.02em;line-height:1;
  }
  .sec-head .eyebrow{font-size:11px;letter-spacing:.2em;color:var(--forge);text-transform:uppercase;font-weight:600;}

  /* ---------- progress bar ---------- */
  .progress{margin:0 0 18px;}
  .progress .track{height:6px;background:var(--surface-2);border-radius:99px;overflow:hidden;}

  /* ---------- block bar (program tab) ---------- */

    color:var(--chalk);font-family:'Oswald',sans-serif;font-weight:600;font-size:21px;text-transform:uppercase;

    padding:2px 9px;border-radius:99px;text-transform:uppercase;}

    padding-bottom:env(safe-area-inset-bottom);

    <svg viewBox="0 0 24 24"><path d="M6 3v4M18 3v4M3 9h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/></svg>
    Today
  </button>

    <svg viewBox="0 0 24 24"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
    Vault
  </button>
  <button data-view="program">
    <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11M6.5 6.5v11M6.5 17.5h11M3 9V4h2M21 9V4h-2M3 20v-5h2M21 20v-5h-2"/></svg>
    Program

<div id="toast"></div>

<script>
// On-device storage — data lives in this browser, no network needed.
const NS = 'ironlog:';

let program  = { days: [] };
let sessions = [];
let draft    = null;          // { dayId, dateISO, entries: { exId:[{w,r},...] } }
let view     = 'today';
let selectedDayId = null;
let openEx   = {};            // exId -> bool (which cards expanded today)
let openSession = {};         // sessionId -> bool
let vaultTab = 'history';     // history | progress
let progressExName = null;
let showImport = false;       // program tab: import panel open
let blockFilter = 'all';      // vault history filter by block

const uid = () => Math.random().toString(36).slice(2,9);
const $app = document.getElementById('app');

/* ---------- storage (localStorage, this device) ---------- */
function load(key, fallback){
  try{ const v = localStorage.getItem(NS+key); return v!=null ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function persist(key, val){
  try{ localStorage.setItem(NS+key, JSON.stringify(val)); }
  catch(e){ console.error('save failed', e); toast('Storage is full or blocked'); }
}
const saveProgram  = () => persist('program', program);
const saveSessions = () => persist('sessions', sessions);
const saveDraft    = () => { try{ draft ? localStorage.setItem(NS+'draft', JSON.stringify(draft)) : localStorage.removeItem(NS+'draft'); }catch(e){} };

/* ---------- seed ---------- */
function seedProgram(){
  const mk = (name, target, sets, note='') => ({ id:uid(), name, target, sets, note });
  return { block:{ name:'Sample block', start:new Date().toISOString(), weeks:6 }, days:[
    { id:uid(), name:'Push', exercises:[
      mk('Bench Press','5',3), mk('Overhead Press','8',3),
      mk('Incline DB Press','10',3), mk('Triceps Pushdown','12',3),
      mk('Lateral Raise','15',3) ]},
    { id:uid(), name:'Pull', exercises:[
      mk('Deadlift','5',1,'One heavy top set'), mk('Barbell Row','8',3),
      mk('Lat Pulldown','10',3), mk('Face Pull','15',3), mk('Barbell Curl','12',3) ]},
    { id:uid(), name:'Legs', exercises:[
      mk('Back Squat','5',3), mk('Romanian Deadlift','8',3),
      mk('Leg Press','12',3), mk('Leg Curl','12',3), mk('Calf Raise','15',4) ]},
    { id:uid(), name:'Conditioning', exercises:[
      mk('Rower intervals','500m × 5','5','90s rest between'),
      mk('KB Swing','20',4), mk('Sled Push','40m',5) ]},
  ]};
}

/* ---------- helpers ---------- */
function dayById(id){ return program.days.find(d=>d.id===id); }

function weekFor(dateISO){
  const b=program.block;
  if(!b||!b.start) return null;
  let wk=Math.floor((new Date(dateISO)-new Date(b.start))/(7*864e5))+1;
  if(wk<1) wk=1;
  const max=Number(b.weeks)||6;
  return wk>max ? max : wk;
}
function currentWeek(){ return weekFor(new Date().toISOString()); }

// merge an exercise with its week-specific prescription (if any) for week wk
function effEx(ex, wk){
  const o = { name:ex.name, sets:ex.sets, target:ex.target, note:ex.note||'', locked:false, unlockWk:null };
  if(ex.startWeek && wk!=null && wk < ex.startWeek){ o.locked=true; o.unlockWk=ex.startWeek; }
  if(ex.weeks && wk!=null && ex.weeks[wk]){
    const w=ex.weeks[wk];
    if(w.sets!=null   && w.sets!=='')   o.sets=String(w.sets);
    if(w.target!=null && w.target!=='') o.target=String(w.target);
    if(w.note!=null   && w.note!=='')   o.note=String(w.note);
  }
  return o;
}

function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
}
function todayLabel(){
  const d=new Date();
  return { dow:d.toLocaleDateString(undefined,{weekday:'long'}),
           date:d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) };
}

// pull the first number out of a value like "225", "24kg", "BW+25", "30in"
function numOf(v){
  const m=String(v??'').match(/-?\d+(?:\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}

// most recent logged sets for an exercise (matched by name so it survives id edits)
function lastSets(exName){
  for(let i=sessions.length-1;i>=0;i--){
    const e=sessions[i].entries.find(x=>x.name===exName && x.sets.some(s=>s.w||s.r));
    if(e) return { sets:e.sets, date:sessions[i].dateISO };
  }
  return null;
}
function topWeight(sets){
  let best=null;
  sets.forEach(s=>{ const w=numOf(s.w); if(w!=null) best=(best==null)?w:Math.max(best,w); });
  return best;
}
function sessionVolume(s){
  let v=0;
  s.entries.forEach(e=>e.sets.forEach(st=>{ const w=numOf(st.w),r=numOf(st.r); if(w!=null&&r!=null) v+=w*r; }));
  return v;
}

/* ---------- draft management ---------- */
function ensureDraft(dayId){
  if(!draft || draft.dayId!==dayId){
    draft = { dayId, dateISO:new Date().toISOString(), entries:{} };
  }
  const day=dayById(dayId);
  if(day){
    const wk=currentWeek();
    day.exercises.forEach(ex=>{
      const eff=effEx(ex,wk);
      if(eff.locked) return;
      if(!draft.entries[ex.id]){
        const n=Math.max(1,parseInt(eff.sets)||1);
        draft.entries[ex.id]=Array.from({length:n},()=>({w:'',r:''}));
      }
    });
  }
}
function dayProgress(day){
  const wk=currentWeek();
  let done=0,total=0;
  day.exercises.forEach(ex=>{
    if(effEx(ex,wk).locked) return;
    const rows=(draft&&draft.entries[ex.id])||[];
    rows.forEach(s=>{ total++; if(s.w!==''||s.r!=='') done++; });
  });
  return {done,total};
}

/* ===================================================================
   RENDER
=================================================================== */
function render(){
  const t=todayLabel();
  document.getElementById('dateBox').innerHTML=`<b>${t.dow}</b>${t.date}`;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.view===view));
  if(view==='today') renderToday();
  else if(view==='vault') renderVault();
  else renderProgram();
}

/* ---------------- TODAY ---------------- */
function renderToday(){
  if(!program.days.length){
    $app.innerHTML=`<div class="empty"><div class="big">No program yet</div>
      Head to <b>Program</b> to set up your training days, then come back here to train.</div>`;
    return;
  }
  if(!selectedDayId || !dayById(selectedDayId)) selectedDayId=program.days[0].id;
  ensureDraft(selectedDayId);
  const day=dayById(selectedDayId);
  const wk=currentWeek();
  const wkMax=(program.block&&Number(program.block.weeks))||6;
  const {done,total}=dayProgress(day);
  const pct=total?Math.round(done/total*100):0;

  let pills=program.days.map(d=>
    `<button class="pill ${d.id===selectedDayId?'on':''}" data-day="${d.id}">${esc(d.name)}</button>`).join('');

  let cards=day.exercises.map(ex=>{
    const eff=effEx(ex,wk);

    if(eff.locked){
      return `<div class="ex locked" data-card="${ex.id}">
        <div class="ex-head">
          <div class="grip"></div>
          <div class="ex-title">
            <div class="name">${esc(ex.name)}</div>
            <div class="meta"><span>Unlocks in week ${eff.unlockWk}</span></div>
          </div>
          <span class="badge" style="color:var(--faint)">WK ${eff.unlockWk}+</span>
        </div>
      </div>`;
    }

    const rows=draft.entries[ex.id]||[];
    const filled=rows.filter(s=>s.w!==''||s.r!=='').length;
    const exDone=filled>=rows.length && rows.length>0;
    const last=lastSets(ex.name);
    const lastTxt=last? `last: ${last.sets.filter(s=>s.w||s.r).map(s=>`${s.w||'–'}×${s.r||'–'}`).join(', ')}` : 'no history yet';
    const isOpen=openEx[ex.id];

    let setRows=rows.map((s,i)=>{
      const lp = last && last.sets[i] ? last.sets[i] : null;
      return `<div class="set-row" data-ex="${ex.id}" data-i="${i}">
        <div class="n">${i+1}</div>
        <input class="${s.w!==''?'filled':''}" inputmode="text" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="${lp&&lp.w?esc(lp.w):'wt'}" value="${esc(s.w)}" data-f="w">
        <input class="${s.r!==''?'filled':''}" inputmode="numeric" placeholder="${lp&&lp.r?esc(lp.r):'reps'}" value="${esc(s.r)}" data-f="r">
        ${rows.length>1
          ? `<div class="rep rm" data-act="delset" data-ex="${ex.id}" data-i="${i}" title="remove set">×</div>`
          : `<div class="rep dis">–</div>`}
      </div>`;
    }).join('');

    return `<div class="ex ${exDone?'done':''} ${isOpen?'open':''}" data-card="${ex.id}">
      <div class="ex-head" data-toggle="${ex.id}">
        <div class="grip"></div>
        <div class="ex-title">
          <div class="name">${esc(ex.name)}</div>
          <div class="meta">
            <span class="target"><b>${esc(eff.sets)}×${esc(eff.target)}</b></span>
            <span class="last">${esc(lastTxt)}</span>
          </div>
        </div>
        ${exDone?'<span class="badge">DONE</span>':`<span class="badge" style="color:var(--muted)">${filled}/${rows.length}</span>`}
        <span class="chev">▶</span>
      </div>
      <div class="ex-body">
        <div class="field-cap"><span>set</span><span>weight</span><span>reps</span><span></span></div>
        ${setRows}
        <button class="repeat" data-act="addset" data-ex="${ex.id}">+ Add set</button>
        ${last?`<button class="repeat" data-act="repeat" data-ex="${ex.id}">↺ Repeat last session</button>`:''}
        <button class="repeat" data-act="renameex" data-ex="${ex.id}">✎ Rename movement</button>
        ${eff.note?`<div class="ex-note">${esc(eff.note)}</div>`:''}
      </div>
    </div>`;
  }).join('');

  $app.innerHTML=`
    <div class="pills">${pills}</div>
    <div class="sec-head">
      <div><div class="eyebrow">${wk?`Week ${wk} of ${wkMax} · `:''}Today’s session</div><h2>${esc(day.name)}</h2></div>
    </div>
    <div class="progress">
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
      <div class="lbl"><span>Sets logged</span><span class="mono">${done} / ${total}</span></div>
    </div>
    ${cards}
    <div class="finish-wrap">
      <button class="btn btn-forge" id="finishBtn" ${done===0?'disabled':''}>
        ${done===0?'Log a set to finish':'Finish &amp; save to vault'}</button>
      ${done>0?'<div class="btn-row"><button class="btn btn-ghost" id="clearDraft">Discard this session</button></div>':''}
    </div>`;
}

/* ---------------- VAULT ---------------- */
function renderVault(){
  const tabs=`<div class="subtabs">
    <div class="subtab ${vaultTab==='history'?'on':''}" data-vtab="history">History</div>
    <div class="subtab ${vaultTab==='progress'?'on':''}" data-vtab="progress">Progression</div></div>`;

  if(!sessions.length){
    $app.innerHTML=tabs+`<div class="empty"><div class="big">Vault is empty</div>
      Finish a session on the <b>Today</b> tab and it’ll be saved here for good.</div>`;
    return;
  }

  if(vaultTab==='history'){
    const blocks=[...new Set(sessions.map(s=>s.block).filter(Boolean))];
    if(blockFilter!=='all' && !blocks.includes(blockFilter)) blockFilter='all';
    const filtered=sessions.filter(s=> blockFilter==='all' || s.block===blockFilter);

    const filterUI = blocks.length>1 ? `<select class="block-filter" id="blockFilter">
        <option value="all" ${blockFilter==='all'?'selected':''}>All blocks (${sessions.length})</option>
        ${blocks.map(b=>`<option value="${esc(b)}" ${blockFilter===b?'selected':''}>${esc(b)}</option>`).join('')}
      </select>` : '';

    let list=filtered.slice().reverse().map(s=>{
      const isOpen=openSession[s.id];
      const vol=sessionVolume(s);
      const tag = s.block ? `<span class="block-tag">${esc(s.block)}${s.week?` · Wk ${s.week}`:''}</span>` : '';
      let lines=s.entries.filter(e=>e.sets.some(st=>st.w||st.r)).map(e=>
        `<div class="log-line"><span class="ln-name">${esc(e.name)}</span>
         <span class="ln-sets">${e.sets.filter(st=>st.w||st.r).map(st=>`${st.w||'–'}×${st.r||'–'}`).join(' ')}</span></div>`
      ).join('');
      return `<div class="session ${isOpen?'open':''}">
        <div class="session-head" data-sess="${s.id}">
          <div class="day"><div class="name">${esc(s.dayName)}</div><div class="when">${fmtDate(s.dateISO)}</div>${tag}</div>
          <div class="vol">${vol?`<b>${Math.round(vol).toLocaleString()}</b>volume`:''}</div>
        </div>
        <div class="session-body">${lines||'<div class="log-line">No sets recorded</div>'}</div>
      </div>`;
    }).join('');
    $app.innerHTML=tabs+`<div class="sec-head"><div><div class="eyebrow">${filtered.length} session${filtered.length===1?'':'s'}</div><h2>History</h2></div></div>`+filterUI+list;
    return;
  }

  // progression
  const names=[...new Set(sessions.flatMap(s=>s.entries.map(e=>e.name)))];
  if(!progressExName || !names.includes(progressExName)) progressExName=names[0];
  let opts=names.map(n=>`<option ${n===progressExName?'selected':''}>${esc(n)}</option>`).join('');

  // gather history points for chosen exercise
  let points=[];
  sessions.forEach(s=>{
    const e=s.entries.find(x=>x.name===progressExName);
    if(e){ const w=topWeight(e.sets); if(w!=null) points.push({date:s.dateISO,w,sets:e.sets,block:s.block,week:s.week}); }
  });

  const best=points.length?Math.max(...points.map(p=>p.w)):null;
  const first=points.length?points[0].w:null;
  const latest=points.length?points[points.length-1].w:null;
  const delta=(first!=null&&latest!=null)?latest-first:null;

  $app.innerHTML=tabs+
    `<select class="prog-select" id="progSel">${opts}</select>
     <div class="stat-row">
       <div class="stat"><div class="v">${best!=null?best:'–'}</div><div class="k">Best</div></div>
       <div class="stat"><div class="v steel">${latest!=null?latest:'–'}</div><div class="k">Latest</div></div>
       <div class="stat"><div class="v" style="color:${delta>=0?'var(--ok)':'var(--forge)'}">${delta!=null?(delta>=0?'+':'')+delta:'–'}</div><div class="k">Change</div></div>
     </div>
     <div class="chart">${sparkline(points)}</div>
     ${points.slice().reverse().map(p=>
        `<div class="hist-line"><span class="h-date">${fmtDate(p.date)}${p.block?`<br><span style="color:var(--forge);font-size:11px">${esc(p.block)}${p.week?` · Wk ${p.week}`:''}</span>`:''}</span>
         <span class="h-val ${p.w===best?'pr':''}">${p.sets.filter(s=>s.w||s.r).map(s=>`${s.w||'–'}×${s.r||'–'}`).join(' ')}${p.w===best?' PR':''}</span></div>`
     ).join('')}`;
}

function sparkline(points){
  if(points.length<2) return `<div style="color:var(--muted);font-size:13px;text-align:center;padding:30px 0">Log this lift across a few sessions to see your trend.</div>`;
  const W=400,H=140,pad=14;
  const ws=points.map(p=>p.w);
  const min=Math.min(...ws),max=Math.max(...ws),span=(max-min)||1;
  const x=i=>pad+(i*(W-2*pad)/(points.length-1));
  const y=w=>H-pad-((w-min)/span)*(H-2*pad);
  let path=points.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.w).toFixed(1)}`).join(' ');
  let dots=points.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.w).toFixed(1)}" r="3.5" fill="${p.w===max?'var(--forge)':'var(--steel)'}"/>`).join('');
  let area=`${path} L${x(points.length-1).toFixed(1)} ${H-pad} L${pad} ${H-pad} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--forge)" stop-opacity=".22"/>
      <stop offset="1" stop-color="var(--forge)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g)"/>
    <path d="${path}" fill="none" stroke="var(--forge)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}</svg>`;
}

/* ---------------- PROGRAM ---------------- */
function renderProgram(){
  const wk=currentWeek();
  let days=program.days.map(d=>{
    let exCap=`<div class="pe-ex-cap"><span>exercise</span><span>sets</span><span>target</span><span></span></div>`;
    let exs=d.exercises.map(ex=>
      `<div class="pe-ex" data-day="${d.id}" data-ex="${ex.id}">
         <input value="${esc(ex.name)}" data-f="name" placeholder="Exercise">
         <input class="num" value="${esc(ex.sets)}" data-f="sets" inputmode="numeric" placeholder="3">
         <input class="num" value="${esc(ex.target)}" data-f="target" placeholder="8–12">
         <button class="x" data-act="delex" data-day="${d.id}" data-ex="${ex.id}">×</button>
       </div>
       <input class="pe-noteinput" value="${esc(ex.note||'')}" data-f="note" data-day="${d.id}" data-ex="${ex.id}" placeholder="note (optional)">
       ${(ex.weeks||ex.startWeek)?`<div class="pe-wk-tag">Week-aware${ex.startWeek?` · unlocks wk ${ex.startWeek}`:''}${ex.weeks?` · per-week Rx`:''}</div>`:''}`
    ).join('');
    return `<div class="pe-day">
      <div class="pe-day-head">
        <input value="${esc(d.name)}" data-dayname="${d.id}" placeholder="Day name">
        <button class="icon-btn danger" data-act="delday" data-day="${d.id}">🗑</button>
      </div>
      ${d.exercises.length?exCap+exs:'<div style="padding:14px;color:var(--muted);font-size:13px">No exercises yet.</div>'}
      <button class="pe-add" data-act="addex" data-day="${d.id}">+ Add exercise</button>
    </div>`;
  }).join('');

  const b=program.block||{name:'',start:null,weeks:6};
  const blockBar=`
    <div class="block-bar">
      <div class="eyebrow">Current block</div>
      <input data-blockname value="${esc(b.name)}" placeholder="Name this block">
      <div class="block-sub">
        <span class="wk-now">${wk?`Week ${wk} of ${Number(b.weeks)||6}`:'No start date set'}</span>
        <span>Started ${b.start?fmtDate(b.start):'—'}${b.weeks?` · ${b.weeks}-week block`:''}</span>
        <button class="linkbtn" data-act="startblock">Set week 1 to today</button>
        <button class="linkbtn" data-act="setweek">Set current week…</button>
      </div>
    </div>`;

  const tools=`
    <div class="tools">
      <button class="toggle" data-act="toggleimport">Import or export a block <span>${showImport?'▴':'▾'}</span></button>
      ${showImport?`<div class="import-panel">
        <p class="import-hint">Paste a block I’ve given you and tap Load — it swaps in the new training days and keeps every past session in your vault. Blocks can include per-week prescriptions ("weeks") and unlock gates ("startWeek"). Or tap Copy to export your current program.</p>
        <textarea id="importBox" placeholder="Paste block JSON here…"></textarea>
        <div class="btn-row" style="margin-top:10px">
          <button class="btn btn-forge" data-act="loadblock">Load block</button>
          <button class="btn btn-ghost" data-act="exportprog">Copy current</button>
        </div>
      </div>`:''}
    </div>`;

  $app.innerHTML=`
    <div class="sec-head"><div><div class="eyebrow">Build your routine</div><h2>Program</h2></div></div>
    ${blockBar}
    ${days||'<div class="empty">Add your first training day below.</div>'}
    <button class="btn btn-ghost" data-act="addday" style="margin-top:6px">+ Add training day</button>
    ${tools}
    <div class="danger-zone"><button data-act="reset">Reset all data &amp; start fresh</button></div>`;
}

/* ===================================================================
   EVENTS (delegated)
=================================================================== */
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  view=b.dataset.view; render(); window.scrollTo(0,0);
});

$app.addEventListener('click',e=>{
  const el=e.target.closest('[data-day],[data-toggle],[data-act],[data-vtab],[data-sess],#finishBtn,#clearDraft');
  if(!el) return;

  // pill day switch (today)
  if(el.dataset.day && el.classList.contains('pill')){ selectedDayId=el.dataset.day; openEx={}; render(); return; }

  // expand exercise card
  if(el.dataset.toggle){ openEx[el.dataset.toggle]=!openEx[el.dataset.toggle]; render(); return; }

  // expand session in vault
  if(el.dataset.sess){ openSession[el.dataset.sess]=!openSession[el.dataset.sess]; render(); return; }

  // vault subtab
  if(el.dataset.vtab){ vaultTab=el.dataset.vtab; render(); return; }

  const act=el.dataset.act;

  if(act==='repeat'){
    const ex=dayById(selectedDayId).exercises.find(x=>x.id===el.dataset.ex);
    const last=lastSets(ex.name);
    if(last){ draft.entries[ex.id]=last.sets.map(s=>({w:s.w,r:s.r})); saveDraft(); render(); toast('Filled from last session'); }
    return;
  }
  if(act==='addset'){
    const arr=draft.entries[el.dataset.ex];
    const lastRow=arr[arr.length-1]||{w:'',r:''};
    arr.push({w:lastRow.w,r:lastRow.r}); saveDraft(); render(); return;
  }
  if(act==='delset'){
    const arr=draft.entries[el.dataset.ex]; const i=+el.dataset.i;
    if(arr.length>1){ arr.splice(i,1); saveDraft(); render(); }
    return;
  }
  if(act==='renameex'){
    const ex=dayById(selectedDayId).exercises.find(x=>x.id===el.dataset.ex);
    if(!ex) return;
    const nn=prompt('Rename this movement', ex.name);
    if(nn!=null && nn.trim() && nn.trim()!==ex.name){
      ex.name=nn.trim(); saveProgram(); render(); toast('Movement renamed');
    }
    return;
  }
  if(act==='addday'){ program.days.push({id:uid(),name:'New day',exercises:[]}); saveProgram(); render(); return; }
  if(act==='delday'){
    if(confirm('Delete this training day? Logged sessions stay in your vault.')){
      program.days=program.days.filter(d=>d.id!==el.dataset.day); saveProgram(); render(); }
    return;
  }
  if(act==='addex'){
    dayById(el.dataset.day).exercises.push({id:uid(),name:'',target:'8',sets:'3',note:''});
    saveProgram(); render(); return;
  }
  if(act==='delex'){
    const d=dayById(el.dataset.day); d.exercises=d.exercises.filter(x=>x.id!==el.dataset.ex);
    saveProgram(); render(); return;
  }
  if(act==='startblock'){
    program.block=program.block||{name:'',weeks:6};
    program.block.start=new Date().toISOString();
    saveProgram(); render(); toast('Week 1 set to today');
    return;
  }
  if(act==='setweek'){
    const b=program.block=program.block||{name:'',weeks:6};
    const max=Number(b.weeks)||6;
    const raw=prompt(`Which week are you on? (1–${max})`,'');
    if(raw==null) return;
    const n=parseInt(raw,10);
    if(isNaN(n)||n<1||n>max){ toast(`Enter a week from 1 to ${max}`); return; }
    const d=new Date(); d.setHours(0,0,0,0);
    b.start=new Date(d.getTime()-(n-1)*7*864e5).toISOString();
    saveProgram(); render(); toast(`Set to week ${n}`);
    return;
  }
  if(act==='toggleimport'){ showImport=!showImport; render(); return; }
  if(act==='exportprog'){
    const out=JSON.stringify({
      block: (program.block&&program.block.name)||'',
      weeks: (program.block&&program.block.weeks)||6,
      days: program.days.map(d=>({ name:d.name,
        exercises:d.exercises.map(x=>{
          const o={name:x.name,sets:x.sets,target:x.target,note:x.note||''};
          if(x.startWeek) o.startWeek=x.startWeek;
          if(x.weeks) o.weeks=x.weeks;
          return o;
        }) }))
    },null,2);
    const box=document.getElementById('importBox'); if(box) box.value=out;
    if(navigator.clipboard) navigator.clipboard.writeText(out).then(()=>toast('Program copied'),()=>toast('Shown below — copy it'));
    else toast('Shown below — copy it');
    return;
  }
  if(act==='loadblock'){
    const box=document.getElementById('importBox');
    const raw=box?box.value.trim():'';
    if(!raw){ toast('Paste a block first'); return; }
    let data; try{ data=JSON.parse(raw); }catch(err){ toast('That isn’t valid block JSON'); return; }
    if(!data || !Array.isArray(data.days) || !data.days.length){ toast('No training days found'); return; }
    const newDays=data.days.map(d=>({
      id:uid(), name:String(d.name||'Day'),
      exercises:(Array.isArray(d.exercises)?d.exercises:[]).map(x=>{
        const ex={
          id:uid(), name:String(x.name||''), sets:String(x.sets??'3'),
          target:String(x.target??''), note:String(x.note||'') };
        const sw=parseInt(x.startWeek,10);
        if(sw>1) ex.startWeek=sw;
        if(x.weeks && typeof x.weeks==='object' && !Array.isArray(x.weeks)){
          const wkObj={};
          Object.keys(x.weeks).forEach(k=>{
            const kk=parseInt(k,10); if(!kk||kk<1) return;
            const src=x.weeks[k]||{};
            const w={};
            if(src.sets!=null)   w.sets=String(src.sets);
            if(src.target!=null) w.target=String(src.target);
            if(src.note!=null)   w.note=String(src.note);
            if(Object.keys(w).length) wkObj[kk]=w;
          });
          if(Object.keys(wkObj).length) ex.weeks=wkObj;
        }
        return ex;
      })
    }));
    if(confirm('Load this block? Your training days will be replaced. Every logged session stays in your vault.')){
      program.days=newDays;
      program.block={ name:String(data.block||program.block?.name||'New block'),
                      start:new Date().toISOString(), weeks:Number(data.weeks)||6 };
      draft=null; saveDraft(); saveProgram();
      selectedDayId=null; showImport=false; view='today'; render(); window.scrollTo(0,0);
      toast('New block loaded 💪');
    }
    return;
  }
  if(act==='reset'){
    if(confirm('This erases your program AND your entire vault of logged sessions. This cannot be undone. Continue?')){
      program=seedProgram(); sessions=[]; draft=null;
      saveProgram(); saveSessions(); saveDraft();
      selectedDayId=null; view='today'; render(); toast('Reset complete');
    }
    return;
  }

  if(el.id==='finishBtn'){ finishSession(); return; }
  if(el.id==='clearDraft'){
    if(confirm('Discard the sets you logged for this session?')){ draft=null; saveDraft(); render(); }
    return;
  }
});

// input handling (today set logging + program editing)
$app.addEventListener('input',e=>{
  const i=e.target;

  // today set inputs
  const row=i.closest('.set-row');
  if(row){
    const ex=row.dataset.ex, idx=+row.dataset.i, f=i.dataset.f;
    draft.entries[ex][idx][f]=i.value;
    i.classList.toggle('filled', i.value!=='');
    saveDraft();
    // live-update progress + badge without full re-render (keep focus)
    updateTodayMeta();
    return;
  }

  // block name
  if(i.hasAttribute('data-blockname')){ program.block=program.block||{weeks:6,start:null}; program.block.name=i.value; saveProgram(); return; }

  // program day name
  if(i.dataset.dayname!==undefined){ dayById(i.dataset.dayname).name=i.value; saveProgram(); return; }

  // program exercise fields
  const pe=i.closest('.pe-ex')||i.closest('.pe-noteinput');
  if(i.dataset.day && i.dataset.f){
    const d=dayById(i.dataset.day); const ex=d.exercises.find(x=>x.id===i.dataset.ex);
    if(ex){ ex[i.dataset.f]=i.value; saveProgram(); }
  }
});

function updateTodayMeta(){
  const day=dayById(selectedDayId); if(!day)return;
  const {done,total}=dayProgress(day);
  const pct=total?Math.round(done/total*100):0;
  const fill=document.querySelector('.progress .fill');
  const lbl=document.querySelector('.progress .lbl .mono');
  if(fill)fill.style.width=pct+'%';
  if(lbl)lbl.textContent=`${done} / ${total}`;
  const fb=document.getElementById('finishBtn');
  if(fb){ fb.disabled=done===0; fb.innerHTML=done===0?'Log a set to finish':'Finish &amp; save to vault'; }
}

function finishSession(){
  const day=dayById(draft.dayId); if(!day)return;
  const entries=day.exercises.map(ex=>({
    name:ex.name,
    sets:(draft.entries[ex.id]||[]).map(s=>({w:s.w.trim(),r:s.r.trim()}))
  })).filter(e=>e.sets.some(s=>s.w||s.r));
  if(!entries.length){ toast('Nothing logged yet'); return; }
  const b=program.block||{};
  sessions.push({ id:uid(), dateISO:draft.dateISO, dayId:day.id, dayName:day.name,
                  block:b.name||'', week:weekFor(draft.dateISO), entries });
  saveSessions();
  draft=null; saveDraft(); openEx={};
  view='vault'; vaultTab='history'; render(); window.scrollTo(0,0);
  toast('Session saved to vault 💪');
}

/* ---------- utils ---------- */
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// progression select + vault block filter use change event
$app.addEventListener('change',e=>{
  if(e.target.id==='progSel'){ progressExName=e.target.value; render(); }
  if(e.target.id==='blockFilter'){ blockFilter=e.target.value; render(); }
});

/* ---------- boot ---------- */
(function init(){
  program=load('program',null);
  if(!program || !program.days){ program=seedProgram(); saveProgram(); }
  if(!program.block){ program.block={ name:'', start:null, weeks:6 }; saveProgram(); }
  sessions=load('sessions',[]);
  draft=load('draft',null);
  if(draft && draft.dayId) selectedDayId=draft.dayId;
  render();
})();
</script>
